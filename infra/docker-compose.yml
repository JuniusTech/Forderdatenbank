services:
  postgres:
    image: postgres:16-alpine
    container_name: culinary-funding-db
    restart: unless-stopped
    environment:
      POSTGRES_USER: ${POSTGRES_USER:-culinary}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-culinary_dev}
      POSTGRES_DB: ${POSTGRES_DB:-culinary_funding}
    ports:
      - "${POSTGRES_PORT:-15432}:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ./migrations:/docker-entrypoint-initdb.d:ro
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-culinary} -d ${POSTGRES_DB:-culinary_funding}"]
      interval: 5s
      timeout: 5s
      retries: 5

volumes:
  postgres_data:
